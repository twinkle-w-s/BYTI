<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BYTI保研人格测试</title>
  <meta name="description" content="SBTI保研版来了。一个娱乐性保研人精神状态测试。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title"><span class="intro-title-main">BYTI</span><br/><span class="accent-magenta intro-title-sub">保研-人格测试</span></h1>
        <button id="btn-start" class="btn btn-primary">开始测试</button>
        <p class="intro-credit">赛博保研人格终端 · 基于原始测试灵感重构的娱乐向版本</p>
        <p class="intro-note">仅供娱乐归档，不构成任何现实建议</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 31</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-terminal-head">
          <span class="terminal-dot"></span>
          <span class="terminal-meta">MENTAL DIAGNOSTICS // SESSION ACTIVE</span>
          <span class="terminal-state">ARCHIVE READY</span>
        </div>
        <div class="result-kicker" id="result-kicker">人格诊断报告</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">五大模块剖面</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="model-summary" id="model-summary"></div>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-download" class="btn btn-primary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
